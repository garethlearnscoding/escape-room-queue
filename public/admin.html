<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Queue Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Escape Room<span>Booth Admin</span></h1>
    <div class="field">
      <label>Email</label>
      <input id="login-email" type="email" autocomplete="email" />
    </div>
    <div class="field">
      <label>Password</label>
      <input id="login-password" type="password" autocomplete="current-password" />
    </div>
    <div id="login-error"></div>
    <button class="btn" id="login-btn" onclick="login()">Sign in</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <header>
    <div class="title">Escape Room &mdash; <span>Queue Control</span></div>
    <div class="header-right">
      <div class="live-indicator">
        <div class="live-dot"></div>
        Live
      </div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </header>

  <main>
    <!-- STAT BAR -->
    <div class="stat-bar">
      <div class="stat">
        <div class="stat-value" id="stat-waiting">0</div>
        <div class="stat-label">Waiting</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-notified">0</div>
        <div class="stat-label">Notified</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-served">0</div>
        <div class="stat-label">Served today</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total passed through</div>
      </div>
    </div>

    <!-- LEFT PANEL -->
    <div class="panel-left">

      <!-- QR -->
      <div class="panel-section">
        <div class="panel-label">
          QR Code
          <button class="btn-icon" onclick="toggleQRFullscreen()">Full Screen</button>
        </div>
        <div id="qr-container">
          <div id="qr-box"></div>
          <div id="qr-overlay">
            <div class="expired-text" style="color: #ef4444; opacity: 1;">Expired<br>Generate New QR  </div>
          </div>
        </div>
        <div class="qr-meta" id="qr-generated">Not generated yet</div>
        <div id="qr-expires"></div>
        <button class="btn btn-outline" onclick="generateQR()">Generate new QR</button>
      </div>

      <!-- QUEUE CONTROL -->
      <div class="panel-section">
        <div class="panel-label">Queue Control</div>
        <button class="btn btn-large" id="call-btn" onclick="callFirst()">Call to Booth</button>
        <div id="action-result" style="font-family: var(--mono); font-size: 11px; color: var(--text-muted); margin-top: 12px; min-height: 16px;"></div>
      </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="panel-right">
      <div class="table-header">
        <div class="panel-label">Current queue</div>
        <div id="last-updated"></div>
      </div>
      <div class="queue-table">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Status</th>
              <th>Joined</th>
              <th>Window</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="queue-body">
            <tr class="empty-row"><td colspan="6">No one in queue</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- FULLSCREEN QR -->
<div id="qr-modal">
  <button id="qr-modal-close" onclick="toggleQRFullscreen()">Close</button>
  <div style="position: relative;">
    <div id="qr-modal-content"></div>
    <div id="qr-modal-overlay">
      <div class="expired-text" style="color: #ef4444; opacity: 1; font-size: 24px;">Expired<br>Generate New</div>
    </div>
  </div>
</div>

<script>
  // ── STATE ──────────────────────────────────────────────────
  const FIVE_MINUTES = 5 * 60 * 1000;
  let API = "";
  let GITHUB_PAGES_URL = "";
  let SUPABASE_URL = "";
  let SUPABASE_ANON_KEY = "";
  let accessToken = sessionStorage.getItem("admin_token");
  let tokenExpiry = parseInt(sessionStorage.getItem("admin_token_expiry") || "0", 10);
  let refreshTimer = null;
  let expiryTimer = null;

  // ── STARTUP ────────────────────────────────────────────────
  async function init() {
    try {
      const res = await fetch("/api/config");
      const cfg = await res.json();
      API = cfg.apiUrl || window.location.origin;
      GITHUB_PAGES_URL = cfg.githubPagesUrl || "";
      SUPABASE_URL = cfg.supabaseUrl || "";
      SUPABASE_ANON_KEY = cfg.supabaseAnonKey || "";
    } catch {
      API = window.location.origin;
    }

    if (accessToken && Date.now() < tokenExpiry * 1000) {
      showApp();
    } else {
      sessionStorage.removeItem("admin_token");
      sessionStorage.removeItem("admin_token_expiry");
      accessToken = null;
    }
  }

  // ── AUTH ───────────────────────────────────────────────────
  document.getElementById("login-password").addEventListener("keydown", e => {
    if (e.key === "Enter") login();
  });

  async function login() {
    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    const btn = document.getElementById("login-btn");
    const errEl = document.getElementById("login-error");

    errEl.textContent = "";
    btn.disabled = true;
    btn.textContent = "Signing in...";

    try {
      const res = await fetch("/api/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.error || "Invalid credentials";
        return;
      }

      accessToken = data.accessToken;
      sessionStorage.setItem("admin_token", accessToken);
      sessionStorage.setItem("admin_token_expiry", String(data.expiresAt));
      tokenExpiry = data.expiresAt;
      showApp();
    } catch {
      errEl.textContent = "Could not reach server.";
    } finally {
      btn.disabled = false;
      btn.textContent = "Sign in";
    }
  }

  async function logout() {
    sessionStorage.removeItem("admin_token");
    sessionStorage.removeItem("admin_token_expiry");
    accessToken = null;
    clearInterval(refreshTimer);
    document.getElementById("app-screen").style.display = "none";
    document.getElementById("login-screen").style.display = "flex";
  }

  // Authenticated fetch — automatically adds Bearer token
  async function authFetch(url, options = {}) {
    return fetch(url, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${accessToken}`,
        ...(options.headers || {}),
      },
    });
  }

  // ── APP ────────────────────────────────────────────────────
  function showApp() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app-screen").style.display = "flex";
    loadQueue();
    refreshTimer = setInterval(loadQueue, 4000);
  }

  // ── QR ─────────────────────────────────────────────────────
  async function generateQR() {
    const res = await authFetch("/api/token");
    const { token, generatedAt, expiresAt } = await res.json();

    const qrUrl = `${GITHUB_PAGES_URL}?t=${encodeURIComponent(token)}`;
    const box = document.getElementById("qr-box");
    box.innerHTML = "";
    new QRCode(box, { text: qrUrl, width: 220, height: 220, correctLevel: QRCode.CorrectLevel.H });

    document.getElementById("qr-generated").textContent =
      "Generated " + new Date(generatedAt).toLocaleTimeString();

    const expiresMs = new Date(expiresAt).getTime();
    if (expiryTimer) clearInterval(expiryTimer);
    expiryTimer = setInterval(() => {
      const remaining = Math.max(0, expiresMs - Date.now());
      const secs = Math.ceil(remaining / 1000);
      const el = document.getElementById("qr-expires");
      el.textContent = remaining > 0 ? `Expires in ${secs}s` : "Expired — generate a new one";
      el.className = remaining < 30000 ? "urgent" : "";
      if (remaining === 0) clearInterval(expiryTimer);
    }, 500);
  
  }

  function toggleQRFullscreen() {
    const modal = document.getElementById("qr-modal");
    modal.classList.toggle("active");
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      document.getElementById("qr-modal").classList.remove("active");
    }
  });

  // ── SERVE NEXT ─────────────────────────────────────────────
  async function callFirst() {
    const btn = document.getElementById("call-btn");
    btn.disabled = true;
    try {
      const res = await fetch(`${API}/api/call`, { method: "POST" });
      const data = await res.json();
      const el = document.getElementById("action-result");
      if (data.called) {
        el.textContent = `Called: ${data.called}`;
      } else {
        el.textContent = data.error || data.message || "Queue empty";
      }
    } catch (e) {
      console.error(e);
    }
    btn.disabled = false;
    loadQueue();
  }

  async function noShow(id = null) {
    const msg = id ? "Remove this person from the queue?" : "Remove the first person in queue?";
    if (!confirm(msg)) return;
    const btn = id ? null : document.getElementById("noshow-btn");
    if (btn) btn.disabled = true;
    try {
      const res = await fetch(`${API}/api/noshow`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id })
      });
      const data = await res.json();
      const el = document.getElementById("action-result");
      if (data.removed) {
        el.textContent = `Removed: ${data.removed}`;
      } else {
        el.textContent = data.error || data.message || "Queue empty";
      }
    } catch (e) {
      console.error(e);
    }
    if (btn) btn.disabled = false;
    loadQueue();
  }

  async function serveFirst(id = null) {
      const btn = id ? null : document.getElementById("serve-btn");
      if (btn) btn.disabled = true;
      try {
        const res = await fetch(`${API}/api/serve`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id })
        });
        const data = await res.json();
        const el = document.getElementById("action-result");
        if (data.served) {
          el.textContent = `Served: ${data.served}`;
        } else {
          el.textContent = data.error || data.message || "Queue empty";
        }
      } catch (e) {
        console.error(e);
      }
      if (btn) btn.disabled = false;
      loadQueue();
    }

  //       const m = String(Math.floor(remaining / 60000)).padStart(2, "0");

  //         <td class="td-pos">${e.position}</td>

  //         <td class="td-name">${e.label}</td>

  async function loadQueue() {
    const res = await authFetch("/api/queue");

    if (res.status === 401) {
      clearInterval(refreshTimer);
      logout();
      return;
    }

    const data = await res.json();

    const now = Date.now();
    const { queue, total, served, usedTokens } = data;

    // Check if current QR is used
    if (currentToken && usedTokens.some(t => t.token === currentToken)) {
      document.getElementById("qr-box").classList.add("expired");
      document.getElementById("qr-modal-content").classList.add("expired");
      document.getElementById("qr-expires").textContent = "";
      
      const texts = document.querySelectorAll(".expired-text");
      texts.forEach(el => {
        el.innerHTML = "QR Code already used<br>Generate new QR";
      });
    }

    const waiting = queue.filter(e => e.status === "waiting").length;
    const notified = queue.filter(e => e.status === "notified" && !e.expired).length;

    document.getElementById("stat-waiting").textContent = waiting;
    document.getElementById("stat-notified").textContent = notified;
    document.getElementById("stat-served").textContent = served;
    document.getElementById("stat-total").textContent = served + total;
    document.getElementById("last-updated").textContent =
      "Updated " + new Date().toLocaleTimeString();

    // Disable Call button if 2 or more notified
    document.getElementById("call-btn").disabled = notified >= 2;

    const tbody = document.getElementById("queue-body");

    if (queue.length === 0) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="6">No one in queue</td></tr>`;
      return;
    }

    tbody.innerHTML = queue.map(e => {
      const rowClass = e.expired ? "row-expired" : e.status === "notified" ? "row-notified" : "";
      const badge = e.expired
        ? `<span class="badge badge-expired">Expired</span>`
        : e.status === "notified"
        ? `<span class="badge badge-notified">Notified</span>`
        : `<span class="badge badge-waiting">Waiting</span>`;

      let countdown = "—";
      let countdownClass = "td-countdown";
      if (e.status === "notified" && e.notifiedAt) {
        const rem = Math.max(0, NOTIFY_WINDOW - (now - e.notifiedAt));
        const m = String(Math.floor(rem / 60000)).padStart(2, "0");
        const s = String(Math.floor((rem % 60000) / 1000)).padStart(2, "0");
        countdown = rem > 0 ? `${m}:${s}` : "00:00";
        if (rem < 120000) countdownClass += " urgent";
      }

      const joined = new Date(e.joinedAt).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

      let actions = "";
      if (e.status === "notified") {
        actions = `
          <button class="btn btn-small" onclick="serveFirst('${e.id}')">Serve</button>
          <button class="btn btn-danger btn-small" onclick="noShow('${e.id}')">No Show</button>
        `;
      }

      return `
        <tr class="${rowClass}">
          <td class="td-pos">${e.position}</td>
          <td class="td-name">${e.label}</td>
          <td>${badge}</td>
          <td class="td-time">${joined}</td>
          <td class="${countdownClass}">${countdown}</td>
          <td>${actions}</td>
        </tr>`;
    }).join("");
  }

  init();
</script>
</body>
</html>
